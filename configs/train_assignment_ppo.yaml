# Stage 6 assignment-only PPO. Bus charging remains a fixed baseline policy.
env:
  config_path: configs/shanghai_small.yaml
  fallback: true

training:
  seed: 42
  total_episodes: 20
  rollout_episodes: 5
  ppo_epochs: 4
  batch_size: 128
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  lr: 0.0003
  vf_coef: 0.5
  ent_coef: 0.01
  max_grad_norm: 0.5

policy:
  hidden_dims: [256, 256]

bus_baseline:
  name: uniform_30
  battery_threshold_soc: 0.3
  max_charge_seconds: 120

rlaif:
  enabled: false
  lambda_rlaif: 1.0
  reward_model_checkpoint: results/checkpoints/reward_model.pt

output:
  checkpoint_path: results/checkpoints/assignment_ppo.pt
  training_log_path: results/metrics/assignment_ppo_training.csv
  eval_path: results/metrics/assignment_ppo_eval.json
