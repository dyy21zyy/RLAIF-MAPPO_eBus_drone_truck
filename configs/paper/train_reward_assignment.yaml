# Phase 8 formal reward-model training config for assignment.
run_classification: formal
agent_type: assignment
preference_schema_version: 3
candidate_schema_version: 3
input:
  states: results/rlaif/assignment_states.jsonl
  preferences: results/rlaif/assignment_preferences.jsonl
  split_manifest: results/rlaif/assignment_split_manifest.json
output:
  checkpoint: results/checkpoints/reward_assignment.pt
training:
  loss: bradley_terry
  exclude_answers: [tie, abstain]
  min_samples: 1000
  smoke_min_samples: 2
validation:
  grouped_holdout: true
  min_pairwise_accuracy: 0.70

split:
  group_by: scenario
  train_fraction: 0.70
  validation_fraction: 0.15
  test_fraction: 0.15
  seed: 1
