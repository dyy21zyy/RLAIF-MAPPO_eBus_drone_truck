mode: rlaif_reward
training:
  total_episodes: 3000
  evaluation_scenarios: 100
  training_seeds:
  - 1
  - 2
  - 3
  optimizer: Adam
  lr_actor: 5.0e-05
  lr_critic: 5.0e-05
  gamma: 0.997
  gae_lambda: 0.95
  clip_eps: 0.2
  ppo_epochs: 5
  batch_size: 128
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  event_time_reference_min: 1.0
networks:
  assignment_hidden_dims:
  - 256
  - 256
  - 128
  truck_hidden_dims:
  - 256
  - 256
  - 128
  bus_hidden_dims:
  - 256
  - 256
  - 128
  station_hidden_dims:
  - 256
  - 256
  - 128
  critic_hidden_dims:
  - 256
  - 256
  - 128
rlaif:
  enabled: true
  fallback_to_env_reward: false
  fail_on_invalid_reward_model: true
  agents:
    assignment:
      enabled: true
      checkpoint: results/checkpoints/reward_assignment.pt
      lambda: 0.2
      reward_clip: 2.0
    truck:
      enabled: true
      checkpoint: results/checkpoints/reward_truck.pt
      lambda: 0.2
      reward_clip: 2.0
    bus:
      enabled: true
      checkpoint: results/checkpoints/reward_bus.pt
      lambda: 0.2
      reward_clip: 2.0
    station:
      enabled: true
      checkpoint: results/checkpoints/reward_station.pt
      lambda: 0.2
      reward_clip: 2.0
  validation:
    enabled: true
    min_samples: 1000
    min_pairwise_accuracy: 0.70
