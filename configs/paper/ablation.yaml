run_classification: formal
ablation_integrity: strict
ablations:
  - {name: no_rlaif, config_difference: {rlaif_scope: none}, requires_retraining: true, checkpoint: results/formal/ablations/no_rlaif_seed_1.pt, checkpoint_hash: pending, scenario_bank: data/scenarios/test/scenario_bank_manifest.json, evaluation_mode: formal}
  - {name: assignment_only_rlaif, config_difference: {rlaif_scope: assignment}, requires_retraining: true, checkpoint: results/formal/ablations/assignment_only_rlaif_seed_1.pt, checkpoint_hash: pending_assignment, scenario_bank: data/scenarios/test/scenario_bank_manifest.json, evaluation_mode: formal}
  - {name: full_rlaif, config_difference: {rlaif_scope: all}, requires_retraining: true, checkpoint: results/formal/ablations/full_rlaif_seed_1.pt, checkpoint_hash: pending_full, scenario_bank: data/scenarios/test/scenario_bank_manifest.json, evaluation_mode: formal}
  - {name: no_event_time_discount, config_difference: {event_time_discount: false}, requires_retraining: true, checkpoint: results/formal/ablations/no_event_time_discount_seed_1.pt, checkpoint_hash: pending_no_discount}
  - {name: no_event_embedding, config_difference: {event_embedding: false}, requires_retraining: true, checkpoint: results/formal/ablations/no_event_embedding_seed_1.pt, checkpoint_hash: pending_no_embedding, uses_event_embedding_checkpoint: false}
  - {name: no_centralized_critic, config_difference: {centralized_critic: false}, requires_retraining: true, checkpoint: results/formal/ablations/no_centralized_critic_seed_1.pt, checkpoint_hash: pending_no_critic}
  - {name: single_parcel_truck, config_difference: {truck_batching: false}, requires_retraining: false, checkpoint: results/formal/ablations/single_parcel_truck.pt, checkpoint_hash: pending_single_parcel}
  - {name: truck_batching, config_difference: {truck_batching: true}, requires_retraining: false, checkpoint: results/formal/ablations/truck_batching.pt, checkpoint_hash: pending_batching}
  - {name: greedy_bus_loading, config_difference: {bus_loading: greedy}, requires_retraining: false, checkpoint: results/formal/ablations/greedy_bus_loading.pt, checkpoint_hash: pending_greedy_bus}
  - {name: learned_bus_loading, config_difference: {bus_loading: learned}, requires_retraining: true, checkpoint: results/formal/ablations/learned_bus_loading.pt, checkpoint_hash: pending_learned_bus}
  - {name: automatic_battery_charging, config_difference: {battery_charging: automatic}, requires_retraining: false, checkpoint: results/formal/ablations/automatic_battery_charging.pt, checkpoint_hash: pending_auto_battery}
  - {name: learned_battery_charging, config_difference: {battery_charging: learned}, requires_retraining: true, checkpoint: results/formal/ablations/learned_battery_charging.pt, checkpoint_hash: pending_learned_battery}
  - {name: no_passenger_aware_charging, config_difference: {passenger_aware_charging: false}, requires_retraining: true, checkpoint: results/formal/ablations/no_passenger_aware_charging.pt, checkpoint_hash: pending_no_passenger}
