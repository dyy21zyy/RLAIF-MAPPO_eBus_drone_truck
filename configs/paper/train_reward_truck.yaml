# Phase 8 formal reward-model training config for truck.
agent_type: truck
preference_schema_version: v2
candidate_schema_version: v2
input:
  states: results/rlaif/truck_states.jsonl
  preferences: results/rlaif/truck_preferences.jsonl
  split_manifest: results/rlaif/truck_split_manifest.json
output:
  checkpoint: results/checkpoints/reward_truck.pt
training:
  loss: bradley_terry
  exclude_answers: [tie, abstain]
  min_samples: 1000
  smoke_min_samples: 2
validation:
  grouped_holdout: true
  min_pairwise_accuracy: 0.70
