run_classification: formal
model:
  event_embedding_dim: 16
  hidden_dims: [256, 256, 128]
  dropout: 0.10
  activation: relu
training:
  seed: 1
  epochs: 100
  batch_size: 128
  learning_rate: 0.0001
  weight_decay: 0.00001
  max_grad_norm: 1.0
  early_stopping_patience: 10
  minimum_improvement: 0.0001
  optimizer: Adam
  device: auto
split:
  train_fraction: 0.7
  validation_fraction: 0.15
  test_fraction: 0.15
  seed: 1
  group_by: scenario
validation:
  minimum_training_pairs: 1000
  minimum_validation_pairs: 200
  minimum_test_pairs: 200
  minimum_validation_pairwise_accuracy: 0.70
  minimum_test_pairwise_accuracy: 0.70
  minimum_event_pairwise_accuracy: 0.60
  require_positive_average_margin: true
  require_all_event_types_present: true
