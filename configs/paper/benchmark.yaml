run_classification: formal
scenario_bank:
  manifest: data/scenarios/test/scenario_bank_manifest.json
  split: test
  expected_count: 100
  expected_bank_hash: REPLACE_WITH_REAL_HASH
paired_evaluation: true
fallback: false
fail_on_missing_artifact: true
fail_on_missing_metric: true
training_seeds: [1, 2, 3]
methods:
  - method_id: truck_direct_heuristic
  - method_id: integrated_rule_based
  - method_id: assignment_ppo
    policy_checkpoints:
      "1": checkpoints/formal/assignment_ppo_seed_1.pt
      "2": checkpoints/formal/assignment_ppo_seed_2.pt
      "3": checkpoints/formal/assignment_ppo_seed_3.pt
  - method_id: mappo_env
    policy_checkpoints:
      "1": checkpoints/formal/mappo_env_seed_1.pt
      "2": checkpoints/formal/mappo_env_seed_2.pt
      "3": checkpoints/formal/mappo_env_seed_3.pt
  - method_id: mappo_rlaif_assignment
    policy_checkpoints:
      "1": checkpoints/formal/mappo_rlaif_assignment_seed_1.pt
      "2": checkpoints/formal/mappo_rlaif_assignment_seed_2.pt
      "3": checkpoints/formal/mappo_rlaif_assignment_seed_3.pt
    reward_checkpoints:
      assignment: checkpoints/formal/reward_assignment.pt
  - method_id: mappo_rlaif_all
    policy_checkpoints:
      "1": checkpoints/formal/mappo_rlaif_all_seed_1.pt
      "2": checkpoints/formal/mappo_rlaif_all_seed_2.pt
      "3": checkpoints/formal/mappo_rlaif_all_seed_3.pt
    reward_checkpoints:
      assignment: checkpoints/formal/reward_assignment.pt
      truck: checkpoints/formal/reward_truck.pt
      bus: checkpoints/formal/reward_bus.pt
      station: checkpoints/formal/reward_station.pt
