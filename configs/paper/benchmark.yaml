run_classification: formal
scenario_bank:
  split: test
  manifest: data/scenarios/test/scenario_bank_manifest.json
  expected_count: 100
training_seeds: [1, 2, 3]
paired_evaluation: true
fallback: false
fail_on_missing_artifact: true
fail_on_missing_metric: true
output_root: results/formal/benchmark
methods:
  - method_id: truck_direct_heuristic
    display_name: Truck-direct heuristic
  - method_id: integrated_rule_based
    display_name: Integrated rule-based heuristic
  - method_id: assignment_ppo
    policy_checkpoints:
      "1": results/formal/policies/assignment_ppo_seed_1.pt
      "2": results/formal/policies/assignment_ppo_seed_2.pt
      "3": results/formal/policies/assignment_ppo_seed_3.pt
    training_seeds: [1, 2, 3]
  - method_id: mappo_env
    expected_algorithm: four_agent_asynchronous_mappo_env
    expected_rlaif_scope: none
    policy_checkpoints:
      "1": results/formal/policies/mappo_env_seed_1.pt
      "2": results/formal/policies/mappo_env_seed_2.pt
      "3": results/formal/policies/mappo_env_seed_3.pt
    training_seeds: [1, 2, 3]
  - method_id: mappo_rlaif_assignment
    expected_algorithm: four_agent_asynchronous_mappo_rlaif_assignment
    expected_rlaif_scope: assignment
    policy_checkpoints:
      "1": results/formal/policies/mappo_rlaif_assignment_seed_1.pt
      "2": results/formal/policies/mappo_rlaif_assignment_seed_2.pt
      "3": results/formal/policies/mappo_rlaif_assignment_seed_3.pt
    training_seeds: [1, 2, 3]
    reward_checkpoints:
      assignment: results/formal/reward_models/reward_assignment.pt
  - method_id: mappo_rlaif_all
    expected_algorithm: four_agent_asynchronous_mappo_rlaif_all
    expected_rlaif_scope: all
    policy_checkpoints:
      "1": results/formal/policies/mappo_rlaif_all_seed_1.pt
      "2": results/formal/policies/mappo_rlaif_all_seed_2.pt
      "3": results/formal/policies/mappo_rlaif_all_seed_3.pt
    training_seeds: [1, 2, 3]
    reward_checkpoints:
      assignment: results/formal/reward_models/reward_assignment.pt
      truck: results/formal/reward_models/reward_truck.pt
      bus: results/formal/reward_models/reward_bus.pt
      station: results/formal/reward_models/reward_station.pt
