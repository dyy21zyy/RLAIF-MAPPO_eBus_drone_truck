# Phase 8 formal reward-model training config for station.
agent_type: station
preference_schema_version: v2
candidate_schema_version: v2
input:
  states: results/rlaif/station_states.jsonl
  preferences: results/rlaif/station_preferences.jsonl
  split_manifest: results/rlaif/station_split_manifest.json
output:
  checkpoint: results/checkpoints/reward_station.pt
training:
  loss: bradley_terry
  exclude_answers: [tie, abstain]
  min_samples: 1000
  smoke_min_samples: 2
validation:
  grouped_holdout: true
  min_pairwise_accuracy: 0.70
