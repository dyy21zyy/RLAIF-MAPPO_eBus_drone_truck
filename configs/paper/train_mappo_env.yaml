mode: environment_reward
training:
  total_episodes: 3000
  evaluation_scenarios: 100
  training_seeds:
  - 1
  - 2
  - 3
  optimizer: Adam
  lr_actor: 5.0e-05
  lr_critic: 5.0e-05
  gamma: 0.997
  gae_lambda: 0.95
  clip_eps: 0.2
  ppo_epochs: 5
  batch_size: 128
  entropy_coef: 0.01
  ent_coef: 0.01
  value_coef: 0.5
  vf_coef: 0.5
  max_grad_norm: 0.5
  event_time_reference_min: 1.0
networks:
  assignment_hidden_dims:
  - 256
  - 256
  - 128
  truck_hidden_dims:
  - 256
  - 256
  - 128
  bus_hidden_dims:
  - 256
  - 256
  - 128
  station_hidden_dims:
  - 256
  - 256
  - 128
  critic_hidden_dims:
  - 256
  - 256
  - 128

reward:
  scale_artifact: outputs/reward_reference_scales_v1.json
  scale_artifact_hash: freeze-after-estimation
  rlaif_enabled: false
