run_classification: formal
experiments:
  - mode: fixed_policy_robustness
    policy_checkpoint: results/formal/policies/mappo_rlaif_all_seed_1.pt
    policy_checkpoint_hash: pending_fixed_hash
    reward_checkpoints_fixed: true
    dimensions:
      - {name: demand_multiplier, values: [0.8, 1.0, 1.2]}
  - mode: retrained_policy_sensitivity
    combined_table: false
    dimensions:
      - {name: demand_multiplier, value: 0.8, checkpoint: results/formal/sensitivity/demand_0_8_seed_1.pt, policy_checkpoint_hash: pending_demand_0_8}
      - {name: demand_multiplier, value: 1.2, checkpoint: results/formal/sensitivity/demand_1_2_seed_1.pt, policy_checkpoint_hash: pending_demand_1_2}
